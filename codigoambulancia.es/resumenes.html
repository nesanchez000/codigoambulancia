  <script>
    let indiceActual = 0;
    const imagenes = document.querySelectorAll('.carrusel-img');

    function cambiarImagen(direccion) {
      imagenes[indiceActual].classList.remove('active');
      indiceActual = (indiceActual + direccion + imagenes.length) % imagenes.length;
      imagenes[indiceActual].classList.add('active');
    }
  </script>

  <!-- 🧸 Bot buena onda -->
  <div id="bot-bueno">
    <img id="toggle-bot" src="wally2.png" alt="Bot buena onda">
    <div id="mensaje-bot"></div>
  </div>

  <script>
    const mensajesTES = [
      "Te vemos, crack del turno. Ánimo y café virtual ☕",
      "Hoy no solo salvaste vidas, también sembraste calma. Gracias por estar ahí.",
      "Tu rapidez y humanidad hacen más que cualquier sirena. Eres esencial.",
      "Aunque nadie lo vea, tú sabes lo que hiciste. Y eso basta.",
      "Turno tras turno, sigues siendo el héroe que no lleva capa.",
      "Respira. Lo estás haciendo mejor de lo que crees.",
      "No estás sol@. Esta comunidad te entiende y te abraza.",
      "Cada maniobra, cada palabra, cada gesto… suma más de lo que imaginas.",
      "El uniforme no te hace TES. Lo hace tu corazón.",
      "Hoy puede que no te aplaudan, pero mañana alguien recordará que estuviste.",
      "Tu trabajo no siempre se ve, pero siempre se siente.",
      "Recuerda: tú también mereces descanso 💤"
    ];

    function mostrarMensajeTES() {
      const mensaje = mensajesTES[Math.floor(Math.random() * mensajesTES.length)];
      const div = document.getElementById("mensaje-bot");
      div.innerText = mensaje;
      div.style.display = "block";
    }

    window.addEventListener("load", () => {
      mostrarMensajeTES();
      setInterval(mostrarMensajeTES, 90000);

      if (localStorage.getItem("modoOscuro") === "true") {
        document.body.classList.add("dark-mode");
      }
    });

    function toggleTheme() {
      document.body.classList.toggle("dark-mode");
      localStorage.setItem("modoOscuro", document.body.classList.contains("dark-mode"));
    }

    // Opción A: ocultar todo el bot al hacer clic en la imagen
    document.getElementById("toggle-bot").addEventListener("click", () => {
      document.getElementById("bot-bueno").style.display = "none";
    });
  </script>
