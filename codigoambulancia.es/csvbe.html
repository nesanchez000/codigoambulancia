  <!-- 🌙 Botón modo oscuro -->

    <button onclick="toggleTheme()" aria-label="Cambiar a modo oscuro">🌙</button>
  </div>

  <h1>Check List Ambulancia SVB - Exterior</h1>
  <div class="checklist" id="checklist">
    <div class="item"><label>Señalización óptica (rotativos o barra)</label><input type="checkbox"></div>
    <div class="item"><label>Inscripción Ambulancia visible</label><input type="checkbox"></div>
    <div class="item"><label>Puertas accesibles y en buen estado</label><input type="checkbox"></div>
    <div class="item"><label>Escalones o peldaños seguros</label><input type="checkbox"></div>
    <div class="item"><label>Limpieza exterior adecuada</label><input type="checkbox"></div>
    <div class="item"><label>Ruedas en buen estado (presión y desgaste)</label><input type="checkbox"></div>
    <div class="item"><label>Retrovisores y cristales sin daños</label><input type="checkbox"></div>
    <div class="item"><label>Luces exteriores (cortas, largas, freno, intermitentes)</label><input type="checkbox"></div>
    <div class="item"><label>Claxon funcionando</label><input type="checkbox"></div>
    <div class="item"><label>Combustible suficiente</label><input type="checkbox"></div>
    <div class="item"><label>Documentación del vehículo a bordo</label><input type="checkbox"></div>
    <div class="item"><label>Extintor accesible y en buen estado</label><input type="checkbox"></div>
    <div class="item"><label>Rótulos reflectantes en su sitio</label><input type="checkbox"></div>
    <div class="item"><label>Acceso a compartimento de material</label><input type="checkbox"></div>
    <div class="item"><label>Sirena audible y operativa</label><input type="checkbox"></div>
  </div>
  <button onclick="resetChecklist()">Resetear Lista</button>

  <script>
  // 🌙 Función para alternar modo claro/oscuro
  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('modo-oscuro', document.body.classList.contains('dark-mode'));
  }

  // 🕒 Aplica el tema guardado al cargar la página
  window.addEventListener('DOMContentLoaded', () => {
    const modoOscuroGuardado = localStorage.getItem('modo-oscuro') === 'true';
    if (modoOscuroGuardado) {
      document.body.classList.add('dark-mode');
    }
  });
</script>
<script>
    function resetChecklist() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(cb => cb.checked = false);
    }
  </script>
