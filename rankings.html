<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Código Ambulancia</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdf8f0;
      color: #333;
      text-align: center;
    }
    header {
      background-color: #005ea8;
      color: white;
      padding: 40px 20px;
    }
    header h1 {
      margin: 0;
      font-size: 3em;
      letter-spacing: 2px;
    }
    nav {
      margin-top: 30px;
    }
    nav a {
      display: inline-block;
      margin: 10px 15px;
      padding: 12px 20px;
      text-decoration: none;
      color: white;
      background-color: #ff8c00;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    nav a:hover {
      background-color: #e86e00;
    }
    .comentarios {
      max-width: 700px;
      margin: 40px auto;
      text-align: left;
      background: #fff3e0;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #ff8c00;
    }
    .comentario {
      background: #ffffff;
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      border-left: 4px solid #005ea8;
      position: relative;
    }
    .comentario .respuesta {
      margin-left: 20px;
      border-left: 2px dashed #ccc;
      padding-left: 10px;
      margin-top: 10px;
    }
    .comentario button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      color: red;
      font-size: 16px;
      cursor: pointer;
    }
    form {
      margin-top: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1em;
    }
    button.enviar {
      background-color: #005ea8;
      color: white;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>CÓDIGO AMBULANCIA</h1>
  </header>

  <nav>
    <a href="revista.html">Revista</a>
    <a href="CheckList.html">Check-List</a>
    <a href="cursos.html">Cursos Gratis</a>
    <a href="resumenes.html">Resúmenes</a>
    <a href="cuida-al-tes.html">Cuida al TES</a>
    <a href="regalos.html">Regalos</a>
  </nav>

  <div class="comentarios">
    <h2>💬 Comparte tu comentario</h2>
    <form id="formulario">
      <input type="text" id="nombre" placeholder="Tu nombre" required />
      <textarea id="mensaje" placeholder="Tu comentario" required></textarea>
      <button type="submit" class="enviar">Publicar</button>
    </form>
    <div id="listaComentarios"></div>
  </div>

  <script>
    const lista = document.getElementById('listaComentarios');
    const form = document.getElementById('formulario');
    const adminKey = "clave123"; // Cambia esta clave para eliminar comentarios (clave privada)

    let comentarios = JSON.parse(localStorage.getItem('comentariosTES')) || [];

    function renderComentarios() {
      lista.innerHTML = '';
      comentarios.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'comentario';
        div.innerHTML = `<strong>${c.nombre}</strong><p>${c.mensaje}</p>`;
        if (promptAdminKey && promptAdminKey === adminKey) {
          const btn = document.createElement('button');
          btn.textContent = '🗑️';
          btn.onclick = () => eliminarComentario(i);
          div.appendChild(btn);
        }
        lista.appendChild(div);
      });
    }

    let promptAdminKey = null;
    if (confirm("¿Eres administrador?")) {
      promptAdminKey = prompt("Introduce tu clave de administrador:");
    }

    function eliminarComentario(index) {
      if (confirm("¿Seguro que quieres borrar este comentario?")) {
        comentarios.splice(index, 1);
        localStorage.setItem('comentariosTES', JSON.stringify(comentarios));
        renderComentarios();
      }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const mensaje = document.getElementById('mensaje').value;
      comentarios.push({ nombre, mensaje });
      localStorage.setItem('comentariosTES', JSON.stringify(comentarios));
      form.reset();
      renderComentarios();
    });

    renderComentarios();
  </script>
</body>
</html>
