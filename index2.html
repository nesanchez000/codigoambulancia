<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Metadatos SEO básicos -->
<title>Técnicos en Emergencias Sanitarias | @tes_ambulancia</title>
<meta name="description" content="Aprende con @tes_ambulancia: cursos online gratuitos y oficiales para Técnicos en Emergencias Sanitarias (TES). Formación en primeros auxilios, RCP, soporte vital y más.">
<meta name="keywords" content="TES, Técnico en Emergencias Sanitarias, ambulancias, emergencias, formación sanitaria, primeros auxilios, soporte vital, curso RCP, urgencias médicas, SAMU, formación online TES, formación TES gratis, @tes_ambulancia">
<meta name="author" content="@tes_ambulancia">
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Código Ambulancia</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdf8f0;
      color: #333;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }

    header {
      background-color: #f77f00;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .titulo-con-lineas {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .linea-horizontal {
      height: 2px;
      background-color: black;
      width: 60%;
      max-width: 600px;
    }

    .titulo {
      display: flex;
      flex-direction: row;
      gap: 10px;
      align-items: baseline;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
    }

    .codigo {
      color: blue;
    }

    .ambulancia {
      color: black;
      font-style: italic;
    }

       nav {
      margin-top: 30px;
    }

    nav a {
      display: inline-block;
      margin: 10px 15px;
      padding: 12px 20px;
      text-decoration: none;
      color: white;
      background-color: #0029ff;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    nav a:hover {
      background-color: #e86e00;
    }

    .destacado, .bloque {
      margin: 30px auto;
      width: 90%;
      max-width: 700px;
      border-radius: 10px;
      padding: 20px;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .destacado {
      background-color: #fff3e0;
      border: 2px solid #ff8c00;
    }

    .bloque {
      background-color: #e3f2fd;
      border: 2px solid #005ea8;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .destacado img, .bloque img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .bloque button {
      padding: 12px 24px;
      background-color: #ff8c00;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .bloque button:hover {
      background-color: #e86e00;
    }

    /* 🌙 Modo oscuro */
    .dark-mode {
      background-color: #121212;
      color: #f0f0f0;
    }

    .dark-mode header {
      background-color: #222;
    }

    .dark-mode nav a {
      background-color: #444;
      color: #fff;
    }

    .dark-mode nav a:hover {
      background-color: #666;
    }

    .dark-mode .destacado {
      background-color: #2a2a2a;
      border-color: #bb6f00;
    }

    .dark-mode .bloque {
      background-color: #1e1e1e;
      border-color: #007acc;
    }

    .dark-mode .bloque button {
      background-color: #bb6f00;
    }

    .dark-mode .bloque button:hover {
      background-color: #995700;
    }

    .dark-mode .linea-horizontal {
      background-color: white;
    }

    /* 🧸 BOT BUENO */
    #bot-bueno {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      text-align: center;
    }

    #bot-bueno img {
      width: 80px;
    }

    #mensaje-bot {
      background: #ffffff;
      padding: 10px 15px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
      margin-top: 8px;
      font-family: sans-serif;
      font-size: 14px;
      display: none;
      max-width: 240px;
    }

    .dark-mode #mensaje-bot {
      background: #333;
      color: #f0f0f0;
    }

    /* 🌙 Botón modo oscuro flotante */
    #bot-modo-oscuro {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 9999;
    }

    #bot-modo-oscuro button {
      background-color: #555;
      border: none;
      border-radius: 50%;
      padding: 12px 14px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s, transform 0.2s;
    }

    #bot-modo-oscuro button:hover {
      background-color: #333;
      transform: scale(1.1);
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
      }

      .bloque {
        flex-direction: column;
        align-items: center;
      }

      .titulo {
        flex-direction: column;
        font-size: 2rem;
      }

      .linea-horizontal {
        width: 80%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="titulo-con-lineas">
      <div class="linea-horizontal"></div>
      <div class="titulo">
        <span class="codigo">CÓDIGO</span>
        <span class="ambulancia">AMBULANCIA</span>
      </div>
      <div class="linea-horizontal"></div>
    </div>
  </header>

  <!-- 🌙 Botón modo oscuro -->
  <div id="bot-modo-oscuro">
    <button onclick="toggleTheme()" aria-label="Cambiar a modo oscuro">🌙</button>
  </div>

  <nav>
    <a href="revista.html">Revista</a>
    <a href="CheckList.html">Check-List</a>
    <a href="foro.html">Foro</a>
    <a href="cursos.html">Cursos Gratis</a>
    <a href="resumenes.html">Resúmenes</a>
    <a href="cuida-al-tes.html">Cuida al TES</a>
    <a href="regalos.html">Regalos</a>
    <a href="recomendaciones.html">Recomendaciones 🎬</a>
  </nav>

  <div class="destacado">
    <a href="nueva-revista.html">
      <img src="revista.jpg" alt="Nueva Revista - Código Ambulancia">
    </a>
  </div>

  <div class="bloque">
    <img src="seccion.jpg" alt="Sección especial" />
    <button onclick="window.location.href='otra-seccion.html'">Abrir</button>
  </div>

  <!-- 🧸 Bot bueno -->
  <div id="bot-bueno">
    <img src="wally3.png" alt="Bot buena onda">
    <div id="mensaje-bot"></div>
  </div>

 <script>
  const mensajesTES = [
    "Te vemos, crack del turno. Ánimo y café virtual ☕",
    "Hoy no solo salvaste vidas, también sembraste calma. Gracias por estar ahí.",
    "Tu rapidez y humanidad hacen más que cualquier sirena. Eres esencial.",
    "Aunque nadie lo vea, tú sabes lo que hiciste. Y eso basta.",
    "Turno tras turno, sigues siendo el héroe que no lleva capa.",
    "Respira. Lo estás haciendo mejor de lo que crees.",
    "No estás sol@. Esta comunidad te entiende y te abraza.",
    "Cada maniobra, cada palabra, cada gesto… suma más de lo que imaginas.",
    "El uniforme no te hace TES. Lo hace tu corazón.",
    "Hoy puede que no te aplaudan, pero mañana alguien recordará que estuviste.",
    "Tu trabajo no siempre se ve, pero siempre se siente.",
    "Recuerda: tú también mereces descanso 💤"
  ];

  function mostrarMensajeTES() {
    const mensajeAleatorio = mensajesTES[Math.floor(Math.random() * mensajesTES.length)];
    const mensajeDiv = document.getElementById("mensaje-bot");
    mensajeDiv.innerText = mensajeAleatorio;
    mensajeDiv.style.display = "block";
  }

  window.addEventListener("load", () => {
    // Mostrar mensaje TES
    mostrarMensajeTES();
    setInterval(mostrarMensajeTES, 90000);

    // Verificar si el modo oscuro ya estaba activado
    const modoOscuroGuardado = localStorage.getItem("modoOscuro");
    if (modoOscuroGuardado === "true") {
      document.body.classList.add("dark-mode");
    }
  });

  function toggleTheme() {
    document.body.classList.toggle("dark-mode");
    const estaEnModoOscuro = document.body.classList.contains("dark-mode");
    localStorage.setItem("modoOscuro", estaEnModoOscuro);
  }
</script>


</body>
</html>
